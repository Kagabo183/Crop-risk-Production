---
# Render Deployment Blueprint
# Defines services for the Crop Risk Prediction Platform
# Deploy: https://dashboard.render.com/new/blueprint

services:
  # FastAPI Web Service
  - type: web
    name: crop-risk-api
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    port: 8000
    healthCheckPath: /api/v1/health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    healthCheckStartTimeout: 120
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: info
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GEE_PROJECT
        value: principal-rhino-482514-f1
      - key: SATELLITE_LOCAL_STORAGE_ENABLED
        value: "false"
      - key: ENABLE_SATELLITE_MONITORING
        value: "true"
      - key: ENABLE_DISEASE_FORECASTING
        value: "true"
      - key: ENABLE_ML_MODELS
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  # Celery Worker Background Service
  - type: worker
    name: crop-risk-worker
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  # Celery Beat Scheduler Background Service
  - type: worker
    name: crop-risk-beat
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  # Redis Service (for Celery)
  - type: redis
    name: crop-risk-redis
    region: oregon
    plan: starter
    ipAllowList: []

# Databases
databases:
  - name: crop-risk-db
    databaseName: crop_risk_db
    engine: postgres
    ipAllowList: []
    plan: starter
    region: oregon
    postgresMajorVersion: 14
