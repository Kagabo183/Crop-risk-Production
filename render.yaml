services:
  - type: web
    name: crop-risk-api
    repo: https://github.com/Kagabo183/Crop-risk-Production
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: info
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: redis
    name: crop-risk-redis
    region: oregon
    plan: free
    ipAllowList: []

databases:
  - name: crop-risk-db
    databaseName: crop_risk_db
    region: oregon
    plan: free
    postgresMajorVersion: 14
