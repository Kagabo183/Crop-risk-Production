services:
  - type: web
    name: crop-risk-api
    repo: https://github.com/Kagabo183/Crop-risk-Production
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: starter
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: info
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: crop-risk-worker
    repo: https://github.com/Kagabo183/Crop-risk-Production
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: starter
    startCommand: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: worker
    name: crop-risk-beat
    repo: https://github.com/Kagabo183/Crop-risk-Production
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    region: oregon
    plan: starter
    startCommand: celery -A app.tasks.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: crop-risk-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: crop-risk-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  - type: redis
    name: crop-risk-redis
    region: oregon
    plan: starter

databases:
  - name: crop-risk-db
    databaseName: crop_risk_db
    region: oregon
    plan: starter
    postgresVersion: 14
