services:
  db:
    image: postgis/postgis:14-3.4
    container_name: crop-risk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: crop_risk_db
    command: [ "-c", "max_connections=200" ]
    ports:
      - "5434:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/docker/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crop-risk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-risk-backend
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/crop_risk_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SATELLITE_LOCAL_STORAGE_ENABLED=false
      - MODEL_DIR=/app/data/models
      - GEE_PROJECT=${GEE_PROJECT:-principal-rhino-482514-f1}
    volumes:
      - ./backend:/app:cached
      - ./data:/app/data:cached
      - ./logs:/app/logs:cached
      - ./ml:/app/ml:cached
      # GEE service-account key (do NOT commit the JSON file to git).
      # Place the key at ./Gee_Key/gee-service-account.json on the host.
      - ./Gee_Key:/app/keys:ro
      # Google Earth Engine OAuth credentials (legacy / application-default)
      - ./data/earthengine:/root/.config/earthengine:cached
      # Copernicus (ERA5) cdsapi configuration
      - ./.cdsapirc:/root/.cdsapirc:ro
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/crop_risk_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SATELLITE_LOCAL_STORAGE_ENABLED=false
      - MODEL_DIR=/app/data/models
      - GEE_PROJECT=${GEE_PROJECT:-principal-rhino-482514-f1}
      - GEE_SERVICE_ACCOUNT_EMAIL=${GEE_SERVICE_ACCOUNT_EMAIL}
      - GEE_PRIVATE_KEY_PATH=/app/keys/gee-service-account.json
      - USE_PLANETARY_COMPUTER=${USE_PLANETARY_COMPUTER:-false}
      - MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT=${MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT:-https://planetarycomputer.microsoft.com/api/stac/v1}
      - ERA5_API_KEY=${ERA5_API_KEY}
      - NOAA_API_KEY=${NOAA_API_KEY}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-risk-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --concurrency=6
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.tasks.celery_app.celery_app inspect ping --timeout=5 2>/dev/null | grep -q OK || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:cached
      - ./data:/app/data:cached
      - ./logs:/app/logs:cached
      - ./ml:/app/ml:cached
      # GEE service-account key
      - ./Gee_Key:/app/keys:ro
      - ./data/earthengine:/root/.config/earthengine:cached
      # Copernicus (ERA5) configuration
      - ./.cdsapirc:/root/.cdsapirc:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:1234@db:5432/crop_risk_db
      - SATELLITE_LOCAL_STORAGE_ENABLED=false
      - COPERNICUS_USERNAME=${COPERNICUS_USERNAME}
      - COPERNICUS_PASSWORD=${COPERNICUS_PASSWORD}
      - MODEL_DIR=/app/data/models
      - GEE_PROJECT=${GEE_PROJECT:-principal-rhino-482514-f1}
      - GEE_SERVICE_ACCOUNT_EMAIL=${GEE_SERVICE_ACCOUNT_EMAIL}
      - GEE_PRIVATE_KEY_PATH=/app/keys/gee-service-account.json
      - USE_PLANETARY_COMPUTER=${USE_PLANETARY_COMPUTER:-false}
      - MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT=${MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT:-https://planetarycomputer.microsoft.com/api/stac/v1}
      - ERA5_API_KEY=${ERA5_API_KEY}
      - NOAA_API_KEY=${NOAA_API_KEY}

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-risk-beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/celerybeat-schedule || exit 1"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:cached
      - ./data:/app/data:cached
      - ./logs:/app/logs:cached
      - ./ml:/app/ml:cached
      # GEE service-account key
      - ./Gee_Key:/app/keys:ro
      - ./data/earthengine:/root/.config/earthengine:cached
      # Copernicus (ERA5) configuration
      - ./.cdsapirc:/root/.cdsapirc:ro
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:1234@db:5432/crop_risk_db
      - SATELLITE_LOCAL_STORAGE_ENABLED=false
      - COPERNICUS_USERNAME=${COPERNICUS_USERNAME}
      - COPERNICUS_PASSWORD=${COPERNICUS_PASSWORD}
      - GEE_PROJECT=${GEE_PROJECT:-principal-rhino-482514-f1}
      - GEE_SERVICE_ACCOUNT_EMAIL=${GEE_SERVICE_ACCOUNT_EMAIL}
      - GEE_PRIVATE_KEY_PATH=/app/keys/gee-service-account.json
      - USE_PLANETARY_COMPUTER=${USE_PLANETARY_COMPUTER:-false}
      - MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT=${MICROSOFT_PLANETARY_COMPUTER_API_STATIC_DOCUMENT:-https://planetarycomputer.microsoft.com/api/stac/v1}
      - ERA5_API_KEY=${ERA5_API_KEY}
      - NOAA_API_KEY=${NOAA_API_KEY}

  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: crop-risk-web-app
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      - web
    environment:
      - VITE_API_URL=http://web:8000
    volumes:
      - ./web-app:/app:cached
      - /app/node_modules

  mobile-app:
    build:
      context: ./mobile-app
      dockerfile: Dockerfile
    container_name: crop-risk-mobile-app
    restart: unless-stopped
    ports:
      - "5175:5175"
    depends_on:
      - web
    environment:
      - VITE_API_URL=http://web:8000
    volumes:
      - ./mobile-app:/app:cached
      - /app/node_modules

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop-risk-seed
    command: python app/scripts/seed_db.py
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:1234@db:5432/crop_risk_db
    volumes:
      - ./backend:/app:cached

volumes:
  db_data:
    driver: local

networks:
  default:
    name: crop-risk-network
